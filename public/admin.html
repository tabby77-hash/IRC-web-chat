<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | #GlobalChat</title>
    <!-- Socket.io Client -->
    <script src="http://localhost:3000/socket.io/socket.io.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        .status-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        
        #authOverlay {
            background: #020617;
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans h-screen flex overflow-hidden">

    <!-- 0. AUTH OVERLAY -->
    <div id="authOverlay">
        <div class="bg-slate-900 p-8 rounded-2xl border border-slate-800 shadow-2xl w-80">
            <h2 class="text-xl font-bold text-indigo-400 mb-4 text-center">Admin Access</h2>
            <input type="password" id="adminPass" placeholder="Enter Master Key" 
                class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-2 mb-4 focus:ring-2 focus:ring-indigo-500 outline-none">
            <button onclick="checkAuth()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-2 rounded-lg font-bold transition">Unlock Dashboard</button>
            <p id="authError" class="text-red-500 text-xs mt-3 hidden text-center">Invalid Credentials</p>
        </div>
    </div>

    <!-- 1. SIDE NAVIGATION -->
    <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col hidden md:flex">
        <div class="p-6 border-b border-slate-800">
            <h1 class="text-xl font-black tracking-tighter text-white">CORE<span class="text-indigo-500">ADMIN</span></h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="#" class="flex items-center space-x-3 bg-indigo-600/10 text-indigo-400 p-3 rounded-lg font-bold">
                <span>Dashboard</span>
            </a>
            <div class="text-[10px] uppercase text-slate-600 font-bold px-3 pt-4">Maintenance</div>
            <a href="#" class="flex items-center space-x-3 text-slate-400 hover:bg-slate-800 hover:text-white p-3 rounded-lg transition">
                <span>Moderation Logs</span>
            </a>
            <a href="#" class="flex items-center space-x-3 text-slate-400 hover:bg-slate-800 hover:text-white p-3 rounded-lg transition">
                <span>Server Settings</span>
            </a>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <button onclick="location.href='chat.html'" class="text-xs text-slate-500 hover:text-white">← Back to Chat View</button>
        </div>
    </aside>

    <!-- 2. MAIN CONTENT -->
    <main class="flex-1 flex flex-col overflow-hidden">
        
        <!-- Top Bar: Connection Status -->
        <header class="h-16 bg-slate-900/50 border-b border-slate-800 flex items-center justify-between px-8">
            <div class="flex items-center space-x-6">
                <div class="flex items-center space-x-2">
                    <span id="serverDot" class="w-3 h-3 bg-green-500 rounded-full status-pulse"></span>
                    <span class="text-sm font-bold">Server: <span id="serverStatus">Connecting...</span></span>
                </div>
                <div class="h-4 w-px bg-slate-700"></div>
                <span class="text-sm text-slate-400"><strong class="text-white" id="userCount">0</strong> users online</span>
            </div>
            <div class="text-xs text-slate-500 font-mono">ADMIN MODE</div>
        </header>

        <!-- Dashboard Content -->
        <div class="flex-1 overflow-y-auto p-8 space-y-8">
            
            <!-- A. BROADCAST SECTION -->
            <section class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-sm">
                <h3 class="text-sm font-bold uppercase tracking-widest text-slate-500 mb-4">Global Broadcast</h3>
                <form id="broadcastForm" class="flex gap-4">
                    <input type="text" id="broadcastMsg" placeholder="Announcement to all users..." 
                        class="flex-1 bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none">
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 px-8 rounded-xl font-bold transition">Send Broadcast</button>
                </form>
            </section>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- B. USER MANAGEMENT TABLE -->
                <div class="lg:col-span-2 bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden">
                    <div class="p-4 border-b border-slate-800 bg-slate-800/30">
                        <h3 class="text-sm font-bold tracking-wide">Live User Management</h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead class="text-xs text-slate-500 uppercase bg-slate-950/50">
                                <tr>
                                    <th class="px-6 py-3">Nickname</th>
                                    <th class="px-6 py-3">Age/G</th>
                                    <th class="px-6 py-3 text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="userTableBody" class="divide-y divide-slate-800">
                                <!-- Users injected here via socket -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- C. LIVE MONITOR -->
                <div class="bg-slate-900 rounded-2xl border border-slate-800 flex flex-col h-[500px]">
                    <div class="p-4 border-b border-slate-800 bg-slate-800/30 flex justify-between">
                        <h3 class="text-sm font-bold">Chat Monitor</h3>
                        <span class="text-[10px] bg-indigo-500/20 text-indigo-400 px-2 py-0.5 rounded">All Messages</span>
                    </div>
                    <div id="adminLogs" class="flex-1 overflow-y-auto p-4 space-y-2 font-mono text-[11px]">
                        <!-- Messages & System logs here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- 1. SOCKET INITIALIZATION ---
        const socket = io('http://localhost:3000');
        let currentUsers = [];

        socket.on('connect', () => {
            document.getElementById('serverStatus').innerText = "Online";
            addLog("System: Connected to backend server.", "text-green-500");
        });

        socket.on('disconnect', () => {
            document.getElementById('serverStatus').innerText = "Offline";
            document.getElementById('serverDot').classList.replace('bg-green-500', 'bg-red-500');
            addLog("System: Disconnected from backend server.", "text-red-500");
        });

        // --- 2. AUTHENTICATION ---
      async function checkAuth() {
    const pass = document.getElementById('adminPass').value;
    const errorEl = document.getElementById('authError');
    
    try {
        // Change the URL to the full path of your server
        const res = await fetch('http://localhost:3000/api/admin-login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: pass })
        });

        if (!res.ok) throw new Error("Server error");

        const data = await res.json();

        if (data.success) {
            document.getElementById('authOverlay').style.display = 'none';
            addLog("Admin session authenticated.", "text-green-400 font-bold");
        } else {
            errorEl.innerText = "Invalid Master Key";
            errorEl.classList.remove('hidden');
        }
    } catch (err) {
        console.error("Login Error:", err);
        errorEl.innerText = "Cannot connect to server";
        errorEl.classList.remove('hidden');
    }
}

        // --- 3. REAL-TIME DATA LISTENERS ---

        // Listen for user list updates
        socket.on('user_list', (users) => {
            currentUsers = users;
            renderUserTable();
        });

        // Monitor Global Chat
        socket.on('receive_global_message', (data) => {
            addLog(`[GLOBAL] ${data.from}: ${data.text}`);
        });

        // Monitor System Messages
        socket.on('system_message', (text) => {
            addLog(`*** ${text}`, 'text-slate-500 italic');
        });

        // --- 4. UI RENDERING ---
        function renderUserTable() {
            const tbody = document.getElementById('userTableBody');
            document.getElementById('userCount').innerText = currentUsers.length;
            
            tbody.innerHTML = currentUsers.map(user => `
                <tr class="hover:bg-slate-800/50 transition">
                    <td class="px-6 py-4">
                        <span class="font-bold text-indigo-300">${user.nickname}</span>
                    </td>
                    <td class="px-6 py-4 text-slate-400">${user.age} / ${user.gender[0].toUpperCase()}</td>
                    <td class="px-6 py-4 text-right space-x-2">
                        <button onclick="adminAction('Kick', '${user.nickname}')" class="text-xs bg-orange-600/10 text-orange-500 hover:bg-orange-600 hover:text-white px-3 py-1 rounded">Kick</button>
                        <button onclick="adminAction('Ban', '${user.nickname}')" class="text-xs bg-red-600/10 text-red-500 hover:bg-red-600 hover:text-white px-3 py-1 rounded font-bold">Ban</button>
                    </td>
                </tr>
            `).join('');
        }

        function addLog(msg, colorClass = "text-slate-400") {
            const logBox = document.getElementById('adminLogs');
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            logBox.insertAdjacentHTML('beforeend', `
                <div class="border-l border-slate-800 pl-2 mb-1">
                    <span class="text-slate-600 text-[9px] mr-1">[${time}]</span> 
                    <span class="${colorClass}">${msg}</span>
                </div>
            `);
            logBox.scrollTop = logBox.scrollHeight;
        }

        // --- 5. BROADCAST & MODERATION ---
        document.getElementById('broadcastForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const msgInput = document.getElementById('broadcastMsg');
            if(msgInput.value.trim()) {
                socket.emit('admin_broadcast', msgInput.value);
                addLog(`BROADCAST SENT: ${msgInput.value}`, 'text-indigo-400 font-bold');
                msgInput.value = '';
            }
        });

        function adminAction(type, nickname) {
    if(confirm(`Are you sure you want to ${type} ${nickname}?`)) {
        if (type === 'Kick') {
            socket.emit('admin_kick', nickname);
        } else if (type === 'Ban') {
            socket.emit('admin_ban', nickname);
        }
        addLog(`ACTION: ${type} issued for ${nickname}`, 'text-red-400');
    }
}
    </script>
</body>
</html>
